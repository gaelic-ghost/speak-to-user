[project]
name = "speak-to-gale"
version = "0.1.0"
description = "A localhost FastMCP server for coding agents to interact with Gale via text to speech."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fastmcp[tasks]>=3.1.0",
    "pydantic>=2.12.5",
    "qwen-tts",
    "soundfile>=0.13.1",
    "transformers==4.57.3",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "ruff>=0.15.6",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "UP", "B"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["qwen_tts", "soundfile"]
ignore_missing_imports = true
